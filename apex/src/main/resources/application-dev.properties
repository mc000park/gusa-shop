# ========================
# Dev profile overrides
# ========================

# JWT
jwt.secret=${JWT_SECRET:dev-only-local-secret-do-not-use-in-production-32x}

# DB
spring.datasource.url=jdbc:h2:mem:gusa-dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PG
pg.toss.secret-key=${PG_TOSS_SECRET_KEY:test_sk_placeholder}
pg.kakao.admin-key=${PG_KAKAO_ADMIN_KEY:}
pg.portone.secret=${PG_PORTONE_SECRET:}
