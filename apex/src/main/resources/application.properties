spring.application.name=apex
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ========================
# DataSource / HikariCP
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:tcp://localhost/~/test}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# JPA
# ========================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================
# HTTP
# ========================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# ========================
# PG (PortOne V2)
# ========================
pg.portone.api-url=https://api.portone.io
pg.portone.secret=${PG_PORTONE_SECRET}

# ========================
# PG toss
# ========================
pg.toss.api-url=https://api.tosspayments.com/v1
pg.toss.secret-key=${PG_TOSS_SECRET_KEY}

# ========================
# PG kakao
# ========================
pg.kakao.api-url=https://kapi.kakao.com/v1/payment
pg.kakao.admin-key=${PG_KAKAO_ADMIN_KEY}

# ========================
# Upload
# ========================
upload.dir=./uploads/products
upload.url-prefix=/uploads/products
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Logging
# ========================
logging.level.root=info
logging.level.com.gusa.apex=debug

# ========================
# CORS
# ========================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
logging.file.path=log
